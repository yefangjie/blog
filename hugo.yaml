baseURL: 'https://yefangjie.github.io/blog'
languageCode: 'zh-CN'
title: '技术博客'
theme: 'PaperMod'

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

pagination:
  pagerSize: 10

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: '技术博客'
  description: '分享 AI、安全、技术的思考与实践'
  keywords: [Blog, AI, Security, Technology, IBM]
  author: 'yefangjie'
  DateFormat: '2006年1月2日'
  defaultTheme: auto
  disableThemeToggle: false

  # 主页信息
  profileMode:
    enabled: true
    title: "技术博客"
    subtitle: "分享 AI、安全、技术的思考与实践"
    imageUrl: "https://avatars.githubusercontent.com/u/1234567"
    imageTitle: "头像"
    imageWidth: 120
    imageHeight: 120
    buttons:
      - name: 文章
        url: posts
      - name: 标签
        url: tags

  # 社交链接
  socialIcons:
    - name: github
      url: "https://github.com/yefangjie"
    - name: linkedin
      url: "https://linkedin.com/in/yefangjie"
    - name: email
      url: "mailto:yefangjie2024@gmail.com"

  # 显示设置
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  # 封面图设置
  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
    responsiveImages: true

  # 编辑链接
  editPost:
    URL: "https://github.com/yefangjie/blog/content"
    Text: "编辑"
    appendFilePath: true

  # 搜索
  search:
    enable: true
    placeholder: "搜索文章..."

  # 页脚
  footer:
    text: "© 2026 技术博客 | Powered by Hugo & PaperMod"
    hideCopyright: false
    hidePoweredBy: false

  assets:
    disableHLJS: false
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: about
      name: 关于
      url: /about/
      weight: 30
